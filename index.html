<!doctype html><html lang="sv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>PoultryMaster</title><style>
:root{--bg:#f2f5ee;--panel:#fffdf8;--ink:#172116;--muted:#677162;--green:#0f2a18;--accent:#18833b;--line:#dfe4d8;--danger:#b73737;--shadow:0 8px 24px rgba(25,40,20,.10);--r:24px}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fbfaf3,#eef5ef);color:var(--ink);padding-bottom:92px}.top{position:sticky;top:0;z-index:5;background:var(--green);color:white;padding:18px 22px;font-weight:900;font-size:1.25rem;box-shadow:0 2px 10px #0002}.top small{display:block;font-size:.78rem;font-weight:700;color:#dbe8d6;margin-top:3px;line-height:1.2}.wrap{padding:26px 18px;max-width:760px;margin:auto}.hidden{display:none!important}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.stat,.quick,.card{background:rgba(255,253,248,.92);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.stat{min-height:92px;display:flex;align-items:center;gap:18px;padding:18px}.stat .ico{font-size:2rem}.stat .num{font-size:2rem;color:var(--accent);font-weight:900}.stat .label{font-weight:800;color:var(--muted)}.quick{padding:20px;text-align:center;font-size:1.1rem;font-weight:900;min-height:105px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}.quick .ico{font-size:2rem}.register-btn{width:100%;font-size:1.25rem;padding:18px;border-radius:22px}.quick-menu{display:grid;grid-template-columns:1fr 1fr;gap:12px}.quick-menu .btn{padding:16px 10px;font-size:1rem}.card{margin:18px 0;overflow:hidden}.card h2,.card h3{margin:0;padding:20px 22px;border-bottom:1px solid var(--line)}.body{padding:18px 22px}.empty{color:var(--muted);padding:8px 0}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:900;background:#eef3ea;color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}.btn.primary{background:var(--accent);color:#fff;box-shadow:none}.btn.danger{background:#fff0f0;color:var(--danger)}.btn.small{padding:9px 12px;font-size:.9rem}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:10px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.pill{display:inline-block;border-radius:999px;padding:6px 10px;background:#edf4ea;font-weight:900;color:#2c6a35}.progress{height:10px;background:#e3e8de;border-radius:999px;overflow:hidden;margin:10px 0}.bar{height:100%;background:var(--accent)}.minirow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin:10px 0}.scorebar{height:12px;background:#e3e8de;border-radius:999px;overflow:hidden}.scorefill{height:100%;background:var(--accent)}.rank{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}.rank:last-child{border-bottom:0}.muted{color:var(--muted)}.tabs{display:flex;gap:10px;margin:12px 0}.tab{flex:1}.tab.active{background:var(--green);color:white}label{display:block;font-weight:900;margin:12px 0 6px}input,select,textarea{width:100%;font:inherit;padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff}textarea{min-height:90px}.bottom{position:fixed;left:0;right:0;bottom:0;background:var(--green);display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));z-index:6}.nav{border:0;background:transparent;color:#cbd8cb;border-radius:20px;padding:8px 4px;font-weight:900}.nav.active{background:rgba(255,255,255,.14);color:#fff}.nav span{display:block;font-size:1.55rem}.modal{position:fixed;inset:0;background:#0008;z-index:20;display:none;align-items:flex-end}.modal.active{display:flex}.sheet{background:#fff;width:100%;max-height:88vh;overflow:auto;border-radius:26px 26px 0 0;padding:18px}.sheet-head{display:flex;justify-content:space-between;align-items:center}.x{border:0;background:#eee;border-radius:50%;width:42px;height:42px;font-size:1.5rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:420px){.wrap{padding:20px 14px}.stat{padding:16px;gap:12px}.stat .num{font-size:1.8rem}}
</style>

</head><body><div class="top"><div>🛡️ PoultryMaster</div><small>Komplett hantering av inkubering, flock och avel</small></div><main class="wrap">
<section id="view-dashboard"><div class="grid"><button class="stat" data-action="view" data-view="eggs"><span class="ico">🥚</span><span class="num" id="s-eggs">0</span><span class="label">Aktiva Ägg</span></button><button class="stat" data-action="incubators"><span class="ico">🔌</span><span class="num" id="s-inc">0</span><span class="label">Kläckare</span></button><button class="stat" data-action="view" data-view="chicks"><span class="ico">🐣</span><span class="num" id="s-chicks">0</span><span class="label">Kycklingar</span></button><button class="stat" data-action="view" data-view="flock"><span class="ico">🐓</span><span class="num" id="s-flock">0</span><span class="label">Flock</span></button><button class="quick" data-action="view" data-view="statistics"><span class="ico">📈</span>Statistik</button><button class="quick" data-action="view" data-view="settings"><span class="ico">⚙️</span>Inställningar</button><button class="quick" data-action="view" data-view="events"><span class="ico">📅</span>Händelser</button><button class="quick" data-action="incubators"><span class="ico">🔌</span>Maskiner</button></div><div class="card"><div class="body"><button class="btn primary register-btn" data-action="register-menu">➕ Registrera</button></div></div><div class="card"><h3>Dagens uppgifter</h3><div class="body" id="tasks"></div></div><div class="card"><h3>Kommande händelser</h3><div class="body" id="upcoming"></div></div><h2>Aktiva kläckningar</h2><div id="hatches"></div></section>
<section id="view-eggs" class="hidden"><div class="row"><h2>Ägg & inkubatorer</h2><button class="btn primary" data-action="add-current">+ Lägg till</button></div><div class="tabs"><button class="btn tab active" id="tab-eggs" data-action="sub" data-sub="eggs">Ägglista</button><button class="btn tab" id="tab-inc" data-action="sub" data-sub="incubators">Inkubatorer</button></div><div id="egg-filters"></div><div id="egg-list"></div></section>
<section id="view-candling" class="hidden"><div class="row"><h2>Lysningsloggar</h2><button class="btn primary" data-action="add" data-type="candling">+ Logga lysning</button></div><div id="candling-list"></div></section>
<section id="view-chicks" class="hidden"><div class="row"><h2>Kycklingar</h2><button class="btn primary" data-action="add" data-type="chick">+ Lägg till</button></div><div id="chick-list"></div></section>
<section id="view-flock" class="hidden"><div class="row"><h2>Flocken</h2><button class="btn primary" data-action="add" data-type="flock">+ Lägg till</button></div><div class="card"><div class="body two"><div><b id="f-total">0</b><br>Totalt</div><div><b id="f-hens">0</b><br>Hönor</div><div><b id="f-roosters">0</b><br>Tuppar</div><div><b id="f-unknown">0</b><br>Okända</div></div></div><div id="flock-list"></div></section>
<section id="view-laying" class="hidden"><div class="row"><h2>Värpning</h2><button class="btn primary" data-action="add" data-type="laying">+ Logga ägg</button></div><div class="card"><div class="body two" id="laying-summary"></div></div><div id="laying-list"></div></section>
<section id="view-statistics" class="hidden"><div class="row"><button class="btn" data-action="view" data-view="dashboard">← Tillbaka</button><h2>Statistik</h2></div><div id="stats"></div></section>
<section id="view-settings" class="hidden"><div class="row"><button class="btn" data-action="view" data-view="dashboard">← Tillbaka</button><h2>Inställningar</h2></div><form class="card" id="settings-form"><div class="body"><label>Inkubationstid</label><input id="set-days" type="number"><label>Första lysning dag</label><input id="set-c1" type="number"><label>Andra lysning dag</label><input id="set-c2" type="number"><label>Lockdown dag</label><input id="set-lock" type="number"><label>Temperatur</label><input id="set-temp" type="number" step="0.1"><label>Fuktighet</label><input id="set-hum" type="number"><br><br><button class="btn primary">Spara</button></div></form><div class="card"><h3>Backup</h3><div class="body"><button class="btn" data-action="export">Exportera data</button><label class="btn primary" style="margin-top:12px;text-align:center">Importera data<input id="import-file" type="file" accept=".json" hidden></label></div></div></section>
<section id="view-events" class="hidden"><div class="row"><button class="btn" data-action="view" data-view="dashboard">← Tillbaka</button><h2>Händelser</h2><button class="btn primary" data-action="add" data-type="event">+ Logga</button></div><div id="event-list"></div></section>
</main><nav class="bottom"><button class="nav active" data-action="view" data-view="dashboard"><span>📊</span>Översikt</button><button class="nav" data-action="view" data-view="eggs"><span>🥚</span>Ägg</button><button class="nav" data-action="view" data-view="candling"><span>🔦</span>Lysning</button><button class="nav" data-action="view" data-view="chicks"><span>🐣</span>Kycklingar</button><button class="nav" data-action="view" data-view="flock"><span>🐓</span>Flock</button><button class="nav" data-action="view" data-view="laying"><span>🥚</span>Värpning</button></nav>
<div class="modal" id="quick-modal"><div class="sheet"><div class="sheet-head"><h2>➕ Registrera</h2><button class="x" data-action="quick-close">×</button></div><div class="quick-menu"><button class="btn" data-action="quick-add" data-type="egg">🥚 Nytt ägg</button><button class="btn" data-action="quick-add" data-type="candling">🔦 Ny lysning</button><button class="btn" data-action="quick-add" data-type="chick">🐣 Ny kyckling</button><button class="btn" data-action="quick-add" data-type="flock">🐔 Ny fågel</button><button class="btn" data-action="quick-add" data-type="laying">🥚 Ny värpning</button><button class="btn" data-action="quick-health-manual">🩺 Hälsa</button><button class="btn" data-action="quick-weight-manual">⚖️ Vikt</button><button class="btn" data-action="quick-add" data-type="event">📅 Händelse</button></div></div></div>
<div class="modal" id="modal"><div class="sheet"><div class="sheet-head"><h2 id="modal-title">Ny post</h2><button class="x" data-action="close">×</button></div><form id="form"><div id="fields"></div><br><button class="btn primary" style="width:100%">Spara</button></form></div></div>
<script>
(()=>{const KEY='egg_manager_v2';let view='dashboard',sub='eggs',formType='',editId=null;const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const uid=p=>p+'-'+Date.now();let state=load();normalize();function def(){return{settings:{incubationDays:21,candling1:8,candling2:14,lockdown:18,temp:37.7,humidity:45},incubators:[{id:'inc-1',name:'River ET-512A',model:'ET-512A',capacity:12,tempTarget:37.7,humidityTarget:45,status:'Aktiv',notes:'Huvudmaskin'},{id:'inc-2',name:'Joom ET-512',model:'ET-512',capacity:12,tempTarget:38.0,humidityTarget:45,status:'Reserv',notes:'Reservmaskin'}],eggs:[],candling:[],chicks:[],flock:[],events:[],laying:[]}}function normalize(){state.settings=state.settings||def().settings;state.incubators=state.incubators||[];state.eggs=state.eggs||[];state.candling=state.candling||[];state.chicks=state.chicks||[];state.flock=state.flock||[];state.events=state.events||[];state.laying=state.laying||[]}function load(){try{return JSON.parse(localStorage.getItem(KEY))||def()}catch{return def()}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function days(a,b=today()){let x=new Date(a),y=new Date(b);x.setHours(0,0,0,0);y.setHours(0,0,0,0);return Math.max(0,Math.floor((y-x)/86400000))}function addDays(a,n){let d=new Date(a);d.setDate(d.getDate()+Number(n));return d.toISOString().slice(0,10)}function dateOnly(a){let d=new Date(a);d.setHours(0,0,0,0);return d}function dayDiff(a,b){return Math.floor((dateOnly(b)-dateOnly(a))/86400000)}function logStart(l){return l.layFrom||l.date}function logEnd(l){return l.layTo||l.date}function periodDays(l){return Math.max(1,dayDiff(logStart(l),logEnd(l))+1)}function overlapDays(a,b,c,d){let s=dateOnly(a)>dateOnly(c)?dateOnly(a):dateOnly(c),e=dateOnly(b)<dateOnly(d)?dateOnly(b):dateOnly(d);return Math.max(0,Math.floor((e-s)/86400000)+1)}function eggsInRange(l,from,to){let c=+l.count||0;return c?c/periodDays(l)*overlapDays(logStart(l),logEnd(l),from,to):0}function fmtNum(n){n=Number(n)||0;return Math.abs(n-Math.round(n))<0.05?String(Math.round(n)):n.toFixed(1)}function incName(id){return state.incubators.find(i=>i.id===id)?.name||'Ingen'}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function latestWeight(id){let key=String(id||'').toLowerCase();let arr=state.events.filter(e=>e.type==='Vägning'&&String(e.targetId||'').toLowerCase()===key&&e.weight).sort((a,b)=>String(a.date).localeCompare(String(b.date)));return arr[arr.length-1]||null}function prevWeight(id){let key=String(id||'').toLowerCase();let arr=state.events.filter(e=>e.type==='Vägning'&&String(e.targetId||'').toLowerCase()===key&&e.weight).sort((a,b)=>String(a.date).localeCompare(String(b.date)));return arr.length>1?arr[arr.length-2]:null}function weightInfo(id){let w=latestWeight(id),p=prevWeight(id);if(!w)return '<p><b>Senaste vikt:</b> Ej loggad</p>';let diff=p?Number(w.weight)-Number(p.weight):null;return `<p><b>Senaste vikt:</b> ${esc(w.weight)} g ${diff!==null?`<span class="pill">${diff>=0?'+':''}${diff} g</span>`:''}<br><small>${esc(w.date)}</small></p>`}function birdOptions(){let opts=[];state.chicks.forEach(c=>opts.push([c.id,'Kyckling '+c.id]));state.flock.forEach(f=>opts.push([f.name,'Flock '+f.name]));state.eggs.forEach(e=>opts.push([e.id,'Ägg '+e.id]));return opts}function parentOptions(gender,current='',selfName=''){let opts=[['','Okänd / ej registrerad']];let cur=String(current||'');let self=String(selfName||'').toLowerCase();state.flock.filter(f=>f.gender===gender&&f.status!=='Död'&&String(f.name||'').toLowerCase()!==self).forEach(f=>opts.push([f.name,f.name+' – '+(f.breed||gender)]));if(cur&&!opts.some(o=>o[0]===cur))opts.push([cur,cur+' (ej registrerad)']);return opts}
function show(v){view=v;document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));$('view-'+v).classList.remove('hidden');document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.view===v));render();window.scrollTo(0,0)}function render(){if(view==='dashboard')dash();if(view==='eggs')sub==='eggs'?eggs():incs();if(view==='candling')candles();if(view==='chicks')chicks();if(view==='flock')flock();if(view==='laying')laying();if(view==='statistics')stats();if(view==='settings')settings();if(view==='events')events()}function dash(){$('s-eggs').textContent=state.eggs.filter(e=>e.status==='Inkuberas').length;$('s-inc').textContent=state.incubators.filter(i=>i.status==='Aktiv').length;$('s-chicks').textContent=state.chicks.length;$('s-flock').textContent=state.flock.length;let tasks=[];for(const e of state.eggs.filter(e=>e.status==='Inkuberas')){let d=days(e.dateSet),s=state.settings;if(d===s.candling1)tasks.push(`🔦 Första lysning: <b>${e.id}</b>`);if(d===s.candling2)tasks.push(`🔦 Andra lysning: <b>${e.id}</b>`);if(d===s.lockdown)tasks.push(`🔒 Lockdown: <b>${e.id}</b>`);if(d===s.incubationDays)tasks.push(`🐣 Kläckdag: <b>${e.id}</b>`)}$('tasks').innerHTML=tasks.length?tasks.map(t=>`<div>${t}</div>`).join(''):'<div class="empty">✅ Inga planerade uppgifter idag.</div>';let up=[];for(const e of state.eggs.filter(e=>e.status==='Inkuberas'))for(const [n,l] of [[state.settings.candling1,'Första lysning'],[state.settings.candling2,'Andra lysning'],[state.settings.lockdown,'Lockdown'],[state.settings.incubationDays,'Kläckning']]){let date=addDays(e.dateSet,n),left=days(today(),date);if(new Date(date)>=new Date(today()))up.push({date,left,l,id:e.id})}up.sort((a,b)=>a.left-b.left);$('upcoming').innerHTML=up.length?up.slice(0,6).map(u=>`<div><b>${u.date}</b> (${u.left?`om ${u.left} d`:'Idag'}) – ${u.l} ${u.id}</div>`).join(''):'<div class="empty">Inga kommande moment.</div>';$('hatches').innerHTML=state.eggs.filter(e=>e.status==='Inkuberas' function eggs(){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===sub));$('egg-filters').innerHTML='';$('egg-list').innerHTML=state.eggs.map(e=>`<div class="card"><h3>🥚 ${esc(e.id)} <span class="pill">${esc(e.status)}</span></h3><div class="body">${e.image ? `<img src="${e.image}" style="width:120px;height:120px;object-fit:cover;border-radius:12px;margin-bottom:12px;">` : ''}<p><b>Ras:</b> ${esc(e.breed)}</p><p><b>Ursprung:</b> ${esc(e.source||'Okänt')}</p><p><b>Datum:</b> ${e.dateSet}</p><p><b>Dag:</b> ${days(e.dateSet)} av ${state.settings.incubationDays}</p><div class="actions">${e.status==='Kläckt'&&!state.chicks.some(c=>c.eggId===e.id)?`<button class="btn small primary" data-action="chick-from-egg" data-id="${esc(e.id)}">🐣 Skapa kyckling</button>`:''}<button class="btn small" data-action="edit" data-type="egg" data-id="${esc(e.id)}">Redigera</button><button class="btn small danger" data-action="del" data-type="egg" data-id="${esc(e.id)}">Ta bort</button></div></div></div>`).join('')||'<div class="card"><div class="body">Inga ägg ännu.</div></div>'}function incs(){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===sub));$('egg-filters').innerHTML='';$('egg-list').innerHTML=state.incubators.map(i=>`<div class="card"><h3>🔌 ${esc(i.name)} <span class="pill">${esc(i.status)}</span></h3><div class="body"><p><b>Modell:</b> ${esc(i.model)}</p><p><b>Kapacitet:</b> ${i.capacity}</p><p><b>Mål:</b> ${i.tempTarget}°C / ${i.humidityTarget}%</p><div class="actions"><button class="btn small" data-action="edit" data-type="incubator" data-id="${esc(i.id)}">Redigera</button><button class="btn small danger" data-action="del" data-type="incubator" data-id="${esc(i.id)}">Ta bort</button></div></div></div>`).join('')}function candles(){$('candling-list').innerHTML=state.candling.map(c=>`<div class="card"><h3>🔦 ${esc(c.eggId)} <span class="pill">Dag ${c.day}</span></h3><div class="body"><p>${c.date} – ${esc(c $('form').addEventListener('submit',async e=>{e.preventDefault();let data=Object.fromEntries(new FormData(e.target).entries());const imageInput=e.target.querySelector('input[name="imageFile"]');const cameraInput=e.target.querySelector('input[name="cameraFile"]');const imageFile=(cameraInput&&cameraInput.files[0])||(imageInput&&imageInput.files[0]);if(imageFile){data.image=await new Promise(resolve=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.readAsDataURL(imageFile);});}else if(editId&&(formType==='chick'||formType==='egg')){const oldItem=find(formType,editId);if(oldItem?.image){data.image=oldItem.image;}}let arr={egg:state.eggs,incubator:state.incubators,candling:state.candling,chick:state.chicks,flock:state.flock,event:state.events,laying:state.laying}[formType];if(formType==='egg'){if(editId)data.id=editId; if(!data.id)return alert('Ange ägg-ID.'); if(!editId&&state.eggs.some(e=>e.id.toLowerCase()===data.id.toLowerCase()))return alert('Det ID:t finns redan.')}else if(formType==='incubator'){data.id=editId||uid('inc');data.capacity=+data.capacity||0;data.tempTarget=+data.tempTarget||37.7;data.humidityTarget=+data.humidityTarget||45}else if(formType==='candling'){data.id=editId||uid('cand');data.day=+data.day||0;if(data.result==='Obefruktat'){let e=state.eggs.find(x=>x.id===data.eggId);if(e)e.status='Obefruktat'}if(data.result==='Dött embryo'||data.result==='Blodring'){let e=state.eggs.find(x=>x.id===data.eggId);if(e)e.status='Dött embryo'}}else if(formType==='chick'){if(editId)data.id=editId;if(!data.id)return alert('Ange kyckling-ID.')}else if(formType==='flock'){data.id=editId||uid('flock')}else if(formType==='event'){data.id=editId||uid('event');if(data.weight==='')delete data.weight}else if(formType==='laying'){data.id=editId||uid('lay');data.count=+data.count||0;if(!data.layFrom)data.layFrom=data.date;if(!data.layTo)data.layTo=data.date;if(dateOnly(data.layFrom)>dateOnly(data.layTo)){let tmp=data.layFrom;data.layFrom=data.la
